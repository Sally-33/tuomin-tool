<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>脱敏小工具</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #0f172a; color: #e2e8f0; padding: 20px; }
.container { max-width: 900px; margin: 0 auto; }
h1 { font-size: 24px; margin-bottom: 4px; color: #60a5fa; }
.sub { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
.row { display: flex; gap: 12px; margin-bottom: 12px; flex-wrap: wrap; }
.btn { padding: 10px 24px; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: #22c55e; color: #fff; }
.btn-success:hover { background: #16a34a; }
.btn-outline { background: transparent; color: #94a3b8; border: 1px solid #475569; }
.btn-outline:hover { background: #1e293b; }
textarea { width: 100%; padding: 16px; border: 1px solid #334155; border-radius: 8px; background: #1e293b; color: #e2e8f0; font-size: 14px; line-height: 1.6; resize: vertical; font-family: inherit; }
textarea:focus { outline: none; border-color: #60a5fa; }
.output-area { background: #1e293b; border: 1px solid #334155; border-radius: 8px; padding: 16px; min-height: 100px; font-size: 14px; line-height: 1.6; white-space: pre-wrap; word-break: break-word; }
.label { font-size: 12px; color: #64748b; margin-bottom: 4px; }
.tab { display: flex; gap: 4px; margin-bottom: 12px; }
.tab button { padding: 6px 16px; border: 1px solid #334155; background: transparent; color: #94a3b8; border-radius: 6px 6px 0 0; cursor: pointer; font-size: 13px; }
.tab button.active { background: #1e293b; border-bottom-color: #1e293b; color: #60a5fa; }
.panel { display: none; }
.panel.active { display: block; }
table { width: 100%; border-collapse: collapse; margin-bottom: 12px; }
th, td { border: 1px solid #334155; padding: 8px 12px; text-align: left; font-size: 13px; }
th { background: #1e293b; color: #94a3b8; font-weight: normal; }
input[type="text"] { width: 100%; padding: 6px 10px; border: 1px solid #334155; border-radius: 4px; background: #0f172a; color: #e2e8f0; font-size: 13px; }
input[type="text"]:focus { outline: none; border-color: #60a5fa; }
.add-row { color: #60a5fa; cursor: pointer; font-size: 13px; margin-top: 8px; display: inline-block; }
.add-row:hover { text-decoration: underline; }
.copy-btn { position: absolute; top: 8px; right: 8px; padding: 4px 12px; font-size: 12px; background: #334155; color: #94a3b8; border: none; border-radius: 4px; cursor: pointer; }
.copy-btn:hover { background: #475569; }
.output-wrap { position: relative; margin-top: 12px; }
.footer { text-align: center; color: #475569; font-size: 12px; margin-top: 30px; }
</style>
</head>
<body>
<div class="container">
<h1>脱敏小工具</h1>
<p class="sub">把敏感词替换成代号 → 发AI润色 → 一键还原 | 纯本地，不联网，文件不会上传</p>

<div class="tab">
<button class="active" onclick="switchTab('replace')">替换</button>
<button onclick="switchTab('restore')">还原</button>
<button onclick="switchTab('config')">敏感词表</button>
</div>

<!-- 替换 -->
<div id="panel-replace" class="panel active">
<div class="label">输入原文（含敏感词）</div>
<textarea id="input-text" rows="6" placeholder="在此粘贴需要脱敏的文本..."></textarea>
<div class="row" style="margin-top: 12px;">
<button class="btn btn-primary" onclick="doReplace()">🔒 替换敏感词</button>
<button class="btn btn-outline" onclick="clearText()">清空</button>
</div>
<div class="output-wrap" id="replace-result-wrap" style="display:none;">
<div class="label">脱敏后（可安全发给AI）</div>
<button class="copy-btn" onclick="copyResult('replace-result')">复制</button>
<div class="output-area" id="replace-result"></div>
</div>
</div>

<!-- 还原 -->
<div id="panel-restore" class="panel">
<div class="label">粘贴AI返回的文本</div>
<textarea id="restore-input" rows="6" placeholder="把AI润色后的文本贴到这里还原..."></textarea>
<div class="row" style="margin-top: 12px;">
<button class="btn btn-success" onclick="doRestore()">↩️ 还原原文</button>
</div>
<div class="output-wrap" id="restore-result-wrap" style="display:none;">
<div class="label">还原后（最终稿）</div>
<button class="copy-btn" onclick="copyResult('restore-result')">复制</button>
<div class="output-area" id="restore-result"></div>
</div>
</div>

<!-- 配置 -->
<div id="panel-config" class="panel">
<p style="color:#94a3b8;font-size:13px;margin-bottom:12px;">左边写原词，右边写替换后的代号。改完自动保存。</p>
<table id="config-table">
<thead><tr><th style="width:40%">原词</th><th style="width:40%">替换为</th><th style="width:20%">操作</th></tr></thead>
<tbody id="config-body"></tbody>
</table>
<span class="add-row" onclick="addConfigRow()">+ 添加一行</span>
<div class="row" style="margin-top:12px;">
<button class="btn btn-primary" onclick="saveConfig()">保存</button>
<button class="btn btn-outline" onclick="loadDefaultConfig()">恢复默认</button>
</div>
</div>

<div class="footer">全部在浏览器本地运行，数据不上传服务器</div>
</div>

<script>
// 默认敏感词表
let replaceMap = {
"张三": "【客户甲】",
"李四": "【客户乙】",
"浦东新区国资委": "【主管部门】",
"浦东公交": "【交通企业】",
"阿里巴巴": "【公司A】",
"腾讯": "【公司B】",
}

function loadConfig() {
try {
const saved = localStorage.getItem("replaceMap");
if (saved) replaceMap = JSON.parse(saved);
} catch(e) {}
}

function saveConfigToStorage() {
localStorage.setItem("replaceMap", JSON.stringify(replaceMap));
}

function renderConfigTable() {
const tbody = document.getElementById("config-body");
tbody.innerHTML = "";
let i = 0;
for (const [k, v] of Object.entries(replaceMap)) {
const tr = document.createElement("tr");
tr.innerHTML = `<td><input type="text" value="${escHtml(k)}" onchange="updateKey(${i}, this.value)" /></td>
<td><input type="text" value="${escHtml(v)}" onchange="updateVal(${i}, this.value)" /></td>
<td style="text-align:center;color:#ef4444;cursor:pointer;" onclick="deleteRow(${i})">✕</td>`;
tbody.appendChild(tr);
i++;
}
}

function updateKey(idx, val) {
const keys = Object.keys(replaceMap);
const vals = Object.values(replaceMap);
const oldKey = keys[idx];
if (oldKey) {
delete replaceMap[oldKey];
replaceMap[val] = vals[idx] || "【代号】";
}
saveConfigToStorage();
}

function updateVal(idx, val) {
const keys = Object.keys(replaceMap);
const key = keys[idx];
if (key) replaceMap[key] = val;
saveConfigToStorage();
}

function deleteRow(idx) {
const keys = Object.keys(replaceMap);
if (keys[idx]) delete replaceMap[keys[idx]];
renderConfigTable();
saveConfigToStorage();
}

function addConfigRow() {
const newKey = "新词" + (Object.keys(replaceMap).length + 1);
replaceMap[newKey] = "【代号X】";
renderConfigTable();
}

function saveConfig() {
saveConfigToStorage();
switchTab("replace");
}

function loadDefaultConfig() {
localStorage.removeItem("replaceMap");
loadConfig();
renderConfigTable();
}

function escHtml(s) {
return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function doReplace() {
const text = document.getElementById("input-text").value;
if (!text.trim()) { alert("请输入文本"); return; }
let result = text;
for (const [k, v] of Object.entries(replaceMap)) {
result = result.split(k).join(v);
}
document.getElementById("replace-result").textContent = result;
document.getElementById("replace-result-wrap").style.display = "block";
}

function doRestore() {
const text = document.getElementById("restore-input").value;
if (!text.trim()) { alert("请输入文本"); return; }
let result = text;
for (const [k, v] of Object.entries(replaceMap)) {
result = result.split(v).join(k);
}
document.getElementById("restore-result").textContent = result;
document.getElementById("restore-result-wrap").style.display = "block";
}

function copyResult(id) {
const el = document.getElementById(id);
navigator.clipboard.writeText(el.textContent).then(() => {
const btn = event.target;
const orig = btn.textContent;
btn.textContent = "已复制";
setTimeout(() => btn.textContent = orig, 1500);
});
}

function clearText() {
document.getElementById("input-text").value = "";
document.getElementById("replace-result-wrap").style.display = "none";
}

function switchTab(name) {
document.querySelectorAll(".tab button").forEach(b => b.classList.remove("active"));
document.querySelectorAll(".panel").forEach(p => p.classList.remove("active"));
event.target.classList.add("active");
document.getElementById("panel-" + name).classList.add("active");
if (name === "config") renderConfigTable();
}

loadConfig();
</script>
</body>
</html>
